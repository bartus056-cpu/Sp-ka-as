<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rejestr badań – Spółka AS</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQ3U0w1Ubp_sm_Vjx6jYCZ5UtGyRIsxug",
  authDomain: "spolka-as.firebaseapp.com",
  projectId: "spolka-as",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let dane = [];
let zaznaczony = null;
let currentUser = "";

// 🔐 LOGIN
window.login = () => signInWithEmailAndPassword(auth, email.value, haslo.value);

// 🆕 REJESTRACJA (z imieniem)
window.register = async () => {
    const userCred = await createUserWithEmailAndPassword(auth, email.value, haslo.value);

    await setDoc(doc(db, "users", userCred.user.uid), {
        name: imie.value,
        email: email.value
    });
}

// 🚪 WYLOGUJ
window.logout = () => signOut(auth);

// 👤 USER + imię
onAuthStateChanged(auth, async user => {
    if(user){
        const ref = doc(db, "users", user.uid);
        const snap = await getDoc(ref);

        if(snap.exists()){
            currentUser = snap.data().name;
        } else {
            currentUser = user.email;
        }

        loginDiv.style.display = "none";
        appDiv.style.display = "block";
        load();
    } else {
        loginDiv.style.display = "block";
        appDiv.style.display = "none";
    }
});

// 📅 dzisiejsza data
function today(){
    return new Date().toISOString().split("T")[0];
}

// 🔄 sync
function load(){
    onSnapshot(collection(db, "rejestr"), snapshot => {
        dane = [];
        snapshot.forEach(docSnap => {
            dane.push({id: docSnap.id, ...docSnap.data()});
        });
        render();
    });
}

// ➕ dodaj
window.dodaj = async () => {
    await addDoc(collection(db, "rejestr"), {
        rejestrujacy: currentUser,
        firma:"",
        material:"",
        start: today(),
        koniec:"",
        vt:"", pt:"", mt:"", ut:"", rt:"",
        r:"", g:"", hv:"", kv:"", ma:"", mi:""
    });
}

// ✏️ update
window.update = async (id, key, value) => {
    await updateDoc(doc(db, "rejestr", id), {[key]: value});
}

// ❌ delete
window.usunZaznaczony = async () => {
    if(!zaznaczony) return alert("Wybierz wiersz");
    await deleteDoc(doc(db, "rejestr", zaznaczony));
    zaznaczony = null;
}

// 🎯 select
window.selectRow = (id) => {
    zaznaczony = zaznaczony === id ? null : id;
    render();
}

// 🔍 wyszukiwarka
function filtruj(dane, fraza){
    return dane.filter(row => 
        Object.values(row).join(" ").toLowerCase().includes(fraza)
    );
}

// 🔢 dropdown
function opcje(val){
    let html = `<option value=""></option>`;
    for(let i=1;i<=99;i++){
        html += `<option ${val==i?"selected":""}>${i}</option>`;
    }
    return html;
}

// 🎨 render
function render(){
    const fraza = search.value.toLowerCase();
    const lista = filtruj(dane, fraza);

    body.innerHTML = "";

    lista.forEach((row, i) => {
        body.innerHTML += `
        <tr class="${zaznaczony===row.id ? 'active' : ''}">
            <td><input type="checkbox"
                ${zaznaczony===row.id?"checked":""}
                onclick="event.stopPropagation(); selectRow('${row.id}')"></td>

            <td>${i+1}</td>
            <td>${row.rejestrujacy || ""}</td>

            <td><input value="${row.firma||""}" onchange="update('${row.id}','firma',this.value)"></td>
            <td><input value="${row.material||""}" onchange="update('${row.id}','material',this.value)"></td>

            <td><input type="date" value="${row.start||today()}" onchange="update('${row.id}','start',this.value)"></td>
            <td><input type="date" value="${row.koniec||""}" onchange="update('${row.id}','koniec',this.value)"></td>

            <td><select onchange="update('${row.id}','vt',this.value)">${opcje(row.vt)}</select></td>
            <td><select onchange="update('${row.id}','pt',this.value)">${opcje(row.pt)}</select></td>
            <td><select onchange="update('${row.id}','mt',this.value)">${opcje(row.mt)}</select></td>
            <td><select onchange="update('${row.id}','ut',this.value)">${opcje(row.ut)}</select></td>
            <td><select onchange="update('${row.id}','rt',this.value)">${opcje(row.rt)}</select></td>

            <td><select onchange="update('${row.id}','r',this.value)">${opcje(row.r)}</select></td>
            <td><select onchange="update('${row.id}','g',this.value)">${opcje(row.g)}</select></td>
            <td><select onchange="update('${row.id}','ma',this.value)">${opcje(row.ma)}</select></td>
            <td><select onchange="update('${row.id}','mi',this.value)">${opcje(row.mi)}</select></td>
            <td><select onchange="update('${row.id}','hv',this.value)">${opcje(row.hv)}</select></td>
            <td><select onchange="update('${row.id}','kv',this.value)">${opcje(row.kv)}</select></td>
        </tr>`;
    });
}
</script>

<style>
body{margin:0;font-family:Arial;background:#eef2f7;}
.header{text-align:center;padding:20px;background:white;}
.header img{height:60px;}
.topbar{text-align:center;padding:10px;}
button{padding:10px;margin:5px;border:none;border-radius:8px;}
.btn-add{background:#3498db;color:white;}
.btn-delete{background:#e74c3c;color:white;}
.btn-logout{background:#7f8c8d;color:white;}
input,select{width:100%;padding:5px;border:none;background:#f4f6f8;}
.table-container{overflow-x:auto;padding:10px;}
table{min-width:1200px;background:white;border-collapse:collapse;}
th{background:#3498db;color:white;padding:8px;}
td{padding:6px;border-bottom:1px solid #eee;}
.active{background:#d6eaff;}
.search{text-align:center;padding:10px;}
.search input{width:250px;padding:8px;}
</style>

</head>

<body>

<div id="loginDiv" style="text-align:center;padding:40px;">
<h2>Logowanie / Rejestracja</h2>

<input id="imie" placeholder="Imię i nazwisko"><br><br>
<input id="email" placeholder="Email"><br><br>
<input id="haslo" type="password" placeholder="Hasło"><br><br>

<button onclick="login()">Zaloguj</button>
<button onclick="register()">Zarejestruj</button>
</div>

<div id="appDiv" style="display:none">

<div class="header">
<img src="logo.png">
<h2>Rejestr badań – Spółka AS</h2>
</div>

<div class="topbar">
<button class="btn-add" onclick="dodaj()">Dodaj</button>
<button class="btn-delete" onclick="usunZaznaczony()">Usuń</button>
<button class="btn-logout" onclick="logout()">Wyloguj</button>
</div>

<div class="search">
<input id="search" placeholder="🔍 Szukaj..." onkeyup="render()">
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>✔</th>
<th>Nr</th>
<th>Rejestrujący</th>
<th>Firma</th>
<th>Materiał</th>
<th>Data Rejestracji</th>
<th>Data Zakończenia</th>
<th>VT</th><th>PT</th><th>MT</th><th>UT</th><th>RT</th>
<th>R</th><th>G</th><th>MA</th><th>MI</th><th>HV</th><th>KV</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>
</div>

</div>

</body>
</html>
