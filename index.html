<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rejestr badań – Spółka AS</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQ3U0w1Ubp_sm_Vjx6jYCZ5UtGyRIsxug",
  authDomain: "spolka-as.firebaseapp.com",
  projectId: "spolka-as",
  storageBucket: "spolka-as.firebasestorage.app",
  messagingSenderId: "339018357387",
  appId: "1:339018357387:web:2b1b1812cef5086f43528e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let dane = [];
let zaznaczony = null;

window.login = () => signInWithEmailAndPassword(auth, email.value, haslo.value);
window.register = () => createUserWithEmailAndPassword(auth, email.value, haslo.value);
window.logout = () => signOut(auth);

onAuthStateChanged(auth, user => {
    if(user){
        loginDiv.style.display = "none";
        appDiv.style.display = "block";
        load();
    } else {
        loginDiv.style.display = "block";
        appDiv.style.display = "none";
    }
});

function load(){
    onSnapshot(collection(db, "rejestr"), snapshot => {
        dane = [];
        snapshot.forEach(docSnap => {
            dane.push({id: docSnap.id, ...docSnap.data()});
        });
        render();
    });
}

window.dodaj = async () => {
    await addDoc(collection(db, "rejestr"), {
        osoba:"",
        firma:"",
        material:"",
        start:"",
        koniec:"",
        vt:false, pt:false, mt:false, ut:false, rt:false
    });
}

window.update = async (id, key, value) => {
    await updateDoc(doc(db, "rejestr", id), {[key]: value});
}

window.selectRow = (id) => {
    zaznaczony = zaznaczony === id ? null : id;
    render();
}

window.usunZaznaczony = async () => {
    if(!zaznaczony){
        alert("Wybierz wiersz");
        return;
    }
    await deleteDoc(doc(db, "rejestr", zaznaczony));
    zaznaczony = null;
}

function render(){
    body.innerHTML = "";

    dane.forEach((row, i) => {
        body.innerHTML += `
        <tr class="${zaznaczony===row.id ? 'active' : ''}">
            <td>
                <input type="checkbox"
                ${zaznaczony===row.id ? "checked":""}
                onclick="event.stopPropagation(); selectRow('${row.id}')">
            </td>

            <td>${i+1}</td>

            <td>
                <select onchange="update('${row.id}','osoba',this.value)">
                    <option></option>
                    <option ${row.osoba=="Michał"?"selected":""}>Michał</option>
                    <option ${row.osoba=="Grzegorz"?"selected":""}>Grzegorz</option>
                    <option ${row.osoba=="Kevin"?"selected":""}>Kevin</option>
                    <option ${row.osoba=="Marcel"?"selected":""}>Marcel</option>
                    <option ${row.osoba=="Bartek"?"selected":""}>Bartek</option>
                </select>
            </td>

            <td><input value="${row.firma||""}" onchange="update('${row.id}','firma',this.value)"></td>
            <td><input value="${row.material||""}" onchange="update('${row.id}','material',this.value)"></td>

            <td><input type="date" value="${row.start||""}" onchange="update('${row.id}','start',this.value)"></td>
            <td><input type="date" value="${row.koniec||""}" onchange="update('${row.id}','koniec',this.value)"></td>

            <td><input type="checkbox" ${row.vt?"checked":""} onchange="update('${row.id}','vt',this.checked)"></td>
            <td><input type="checkbox" ${row.pt?"checked":""} onchange="update('${row.id}','pt',this.checked)"></td>
            <td><input type="checkbox" ${row.mt?"checked":""} onchange="update('${row.id}','mt',this.checked)"></td>
            <td><input type="checkbox" ${row.ut?"checked":""} onchange="update('${row.id}','ut',this.checked)"></td>
            <td><input type="checkbox" ${row.rt?"checked":""} onchange="update('${row.id}','rt',this.checked)"></td>
        </tr>`;
    });
}
</script>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#eef2f7;
}

/* HEADER */
.header {
    background:white;
    text-align:center;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.header img {
    height:60px;
}

.header h1 {
    margin-top:10px;
    color:#2c3e50;
}

/* BUTTONS */
.topbar {
    text-align:center;
    padding:15px;
}

button {
    padding:12px 18px;
    margin:5px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    font-size:14px;
}

.btn-add { background:#3498db; color:white; }
.btn-delete { background:#e74c3c; color:white; }
.btn-logout { background:#7f8c8d; color:white; }

button:hover { opacity:0.9; }

/* TABLE */
.table-container {
    overflow-x:auto;
    padding:10px;
}

table {
    min-width:900px;
    border-collapse: collapse;
    background:white;
    border-radius:12px;
    overflow:hidden;
}

th {
    background:#3498db;
    color:white;
    padding:10px;
}

td {
    padding:8px;
    border-bottom:1px solid #eee;
}

input, select {
    width:100%;
    padding:6px;
    border:none;
    background:#f7f9fc;
    border-radius:5px;
}

.active {
    background:#d6eaff;
}
</style>

</head>

<body>

<div id="loginDiv" style="text-align:center; padding:40px;">
<h2>Logowanie</h2>
<input id="email" placeholder="email"><br><br>
<input id="haslo" type="password" placeholder="hasło"><br><br>
<button onclick="login()">Zaloguj</button>
<button onclick="register()">Zarejestruj</button>
</div>

<div id="appDiv" style="display:none">

<div class="header">
<img src="logo.png">
<h1>Rejestr badań – Spółka AS</h1>
</div>

<div class="topbar">
<button class="btn-add" onclick="dodaj()">➕ Dodaj</button>
<button class="btn-delete" onclick="usunZaznaczony()">🗑️ Usuń</button>
<button class="btn-logout" onclick="logout()">Wyloguj</button>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>✔</th>
<th>Nr</th>
<th>Osoba</th>
<th>Firma</th>
<th>Materiał</th>
<th>Start</th>
<th>Koniec</th>
<th>VT</th>
<th>PT</th>
<th>MT</th>
<th>UT</th>
<th>RT</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>
</div>

</div>

</body>
</html>
